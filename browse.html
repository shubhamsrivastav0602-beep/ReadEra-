<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadEra - Hindi Books Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui; background: #f5f7fa; }
        
        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #8B4513, #c17a3a);
            color: white;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar h1 { font-size: 1.5rem; }
        
        /* Container */
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        
        /* Stats */
        .stats {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .stats span { color: #8B4513; font-weight: bold; }
        
        /* Books Grid */
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        
        /* Book Card */
        .book-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #eef2f7;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.15);
        }
        
        /* Book Cover */
        .book-cover {
            height: 220px;
            background: linear-gradient(135deg, #8B4513, #c17a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            overflow: hidden;
        }
        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* Book Info */
        .book-info { padding: 1rem; }
        .book-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 0.25rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .book-author {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.5rem;
        }
        .book-summary {
            font-size: 0.75rem;
            color: #475569;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .read-btn {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.3rem 0.8rem;
            background: #8B4513;
            color: white;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        
        /* Footer */
        .footer {
            background: #0c2744;
            color: #cbd5e1;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .books-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📚 ReadEra - Hindi Digital Library</h1>
    </div>
    
    <div class="container">
        <div class="stats">
            📖 <span id="bookCount">8</span> Creative Commons Hindi Books | 
            🆓 Free to Read | 
            📥 Download Available
        </div>
        
        <div class="books-grid" id="booksGrid"></div>
    </div>
    
    <div class="footer">
        <p>© 2026 ReadEra | All books are Creative Commons licensed from Internet Archive</p>
    </div>

        function viewBook(bookId) {
            window.location.href = `reader.html?id=${bookId}`;
        }
        
        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            
            if (booksData.length === 0) {
                grid.innerHTML = '<div style="text-align:center; padding:3rem;">No books found. Please run download_books.py again.</div>';
                return;
            }
            
            grid.innerHTML = booksData.map(book => `
                <div class="book-card" onclick="viewBook('${book.id}')">
                    <div class="book-cover">
                        ${book.cover ? `<img src="${book.cover}" alt="${book.title}">` : '📖'}
                    </div>
                    <div class="book-info">
                        <div class="book-title">${book.title.substring(0, 60)}${book.title.length > 60 ? '...' : ''}</div>
                        <div class="book-author">✍️ ${book.author.substring(0, 50)}</div>
                        <div class="book-summary">${book.summary.substring(0, 120)}${book.summary.length > 120 ? '...' : ''}</div>
                        <span class="read-btn">📖 Read Now →</span>
                    </div>
                </div>
            `).join('');
        }
        
        renderBooks();
    </script>
</body>
</html>
